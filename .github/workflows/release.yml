name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build binary
        run: cargo build --release
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/rau dist/
          cd dist
          tar -czf rau-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz rau
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rau-*
